<?xml version="1.0" encoding="UTF-8"?>
<!-- Tally horizontal lockup: mark + wordmark. Transparent background.
     NOTE: the wordmark uses a font fallback. Before publishing, install Plus Jakarta Sans
     (the app's typeface) or convert the <text> to outlines (vector paths) so it renders
     identically everywhere. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360" role="img" aria-label="Tally logo lockup">
  <!-- mark (512-space, scaled) -->
  <g transform="translate(16 20) scale(0.62)" fill="none" stroke-linecap="round" stroke-width="28">
    <g stroke="#1B7A46">
      <path d="M171 171 V341"/>
      <path d="M228 171 V341"/>
      <path d="M284 171 V341"/>
      <path d="M341 171 V341"/>
    </g>
    <path stroke="#E3A73B" d="M142 351 L370 161"/>
  </g>
  <!-- wordmark -->
  <text x="360" y="242" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif"
        font-size="164" font-weight="800" letter-spacing="-4" fill="#1A1B18">Tally</text>
</svg>
